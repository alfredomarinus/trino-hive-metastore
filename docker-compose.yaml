services:

  trino:
    image: trinodb/trino:479
    container_name: trino
    hostname: trino
    restart: unless-stopped
    ports:
      - 8080:8080
      - 8443:8443
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config.properties:/etc/trino/config.properties
      - ./trino/access-control.properties:/etc/trino/access-control.properties
      - ./trino/password-authenticator.properties:/etc/trino/password-authenticator.properties
      - ./trino/password.db:/etc/trino/password.db
      - ./trino/keystore.pem:/etc/trino/keystore.pem
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_REGION: ${S3_REGION}
      TRINO_SHARED_SECRET: ${TRINO_SHARED_SECRET}
      TZ: ${TZ}
    depends_on:
      hive-metastore-bronze:
        condition: service_healthy
      hive-metastore-silver:
        condition: service_healthy
      hive-metastore-gold:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      TZ: ${TZ}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  minio-init:
    image: quay.io/minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/bronze || true;
      mc mb myminio/silver || true;
      mc mb myminio/gold || true;
      exit 0;
      "

  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - 3306:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore-bronze:
    build:
      context: ./hive-metastore
      dockerfile: Dockerfile
    container_name: hive-metastore-bronze
    restart: unless-stopped
    environment:
      HIVE_DB: bronze
      HIVE_USER: ${MYSQL_USER}
      HIVE_PASSWORD: ${MYSQL_PASSWORD}
      HIVE_DB_HOST: mysql
      WAREHOUSE_BUCKET: bronze
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./hive-metastore/conf/hive-site.xml.template:/opt/hive/conf/hive-site.xml.template
    ports:
      - 9083:9083
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  hive-metastore-silver:
    build:
      context: ./hive-metastore
      dockerfile: Dockerfile
    container_name: hive-metastore-silver
    restart: unless-stopped
    environment:
      HIVE_DB: silver
      HIVE_USER: ${MYSQL_USER}
      HIVE_PASSWORD: ${MYSQL_PASSWORD}
      HIVE_DB_HOST: mysql
      WAREHOUSE_BUCKET: silver
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./hive-metastore/conf/hive-site.xml.template:/opt/hive/conf/hive-site.xml.template
    ports:
      - 9084:9083
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  hive-metastore-gold:
    build:
      context: ./hive-metastore
      dockerfile: Dockerfile
    container_name: hive-metastore-gold
    restart: unless-stopped
    environment:
      HIVE_DB: gold
      HIVE_USER: ${MYSQL_USER}
      HIVE_PASSWORD: ${MYSQL_PASSWORD}
      HIVE_DB_HOST: mysql
      WAREHOUSE_BUCKET: gold
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./hive-metastore/conf/hive-site.xml.template:/opt/hive/conf/hive-site.xml.template
    ports:
      - 9085:9083
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    hostname: opa
    restart: unless-stopped
    ports:
      - "${OPA_PORT:-8181}:8181"
    volumes:
      - ./opa/policies:/policies
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--diagnostic-addr=0.0.0.0:8282"
      - "--log-level=info"
      - "/policies"
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    container_name: datahub-zookeeper
    hostname: datahub-zookeeper
    restart: unless-stopped
    ports:
      - "${DATAHUB_ZK_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - datahub-zkdata:/var/lib/zookeeper/data
      - datahub-zklogs:/var/lib/zookeeper/log
    healthcheck:
      test: echo srvr | nc datahub-zookeeper 2181
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s

  datahub-broker:
    image: confluentinc/cp-kafka:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    container_name: datahub-broker
    hostname: datahub-broker
    restart: unless-stopped
    depends_on:
      datahub-zookeeper:
        condition: service_healthy
    ports:
      - "${DATAHUB_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: -Xms512m -Xmx512m
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_MAX_MESSAGE_BYTES: 5242880
    volumes:
      - datahub-broker:/var/lib/kafka/data/
    healthcheck:
      test: nc -z datahub-broker 9092
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 60s

  datahub-schema-registry:
    image: confluentinc/cp-schema-registry:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    container_name: datahub-schema-registry
    hostname: datahub-schema-registry
    restart: unless-stopped
    depends_on:
      datahub-broker:
        condition: service_healthy
    ports:
      - "${DATAHUB_SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: datahub-broker:29092
    healthcheck:
      test: nc -z datahub-schema-registry 8081
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 60s

  datahub-elasticsearch:
    image: elasticsearch:7.10.1
    container_name: datahub-elasticsearch
    hostname: datahub-elasticsearch
    restart: unless-stopped
    ports:
      - "${DATAHUB_ELASTIC_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m -Dlog4j2.formatMsgNoLookups=true
    volumes:
      - datahub-esdata:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: curl -sS --fail http://datahub-elasticsearch:9200/_cluster/health?wait_for_status=yellow&timeout=0s
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 20s

  datahub-mysql:
    image: mysql:8.2
    container_name: datahub-mysql
    hostname: datahub-mysql
    restart: on-failure
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    ports:
      - "${DATAHUB_MYSQL_PORT:-53306}:3306"
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      MYSQL_ROOT_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - datahub-mysqldata:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h datahub-mysql -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 20s

  datahub-kafka-setup:
    image: acryldata/datahub-kafka-setup:${DATAHUB_VERSION:-head}
    container_name: datahub-kafka-setup
    hostname: datahub-kafka-setup
    depends_on:
      datahub-broker:
        condition: service_healthy
      datahub-schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      DATAHUB_PRECREATE_TOPICS: ${DATAHUB_PRECREATE_TOPICS:-false}
    labels:
      datahub_setup_job: "true"

  datahub-upgrade:
    image: acryldata/datahub-upgrade:${DATAHUB_VERSION:-head}
    container_name: datahub-upgrade
    hostname: datahub-upgrade
    command:
      - -u
      - SystemUpdate
    depends_on:
      datahub-elasticsearch:
        condition: service_healthy
      datahub-kafka-setup:
        condition: service_completed_successfully
      datahub-mysql:
        condition: service_healthy
    environment:
      DATAHUB_SQL_SETUP_ENABLED: "true"
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES: "false"
      GRAPH_SERVICE_IMPL: elasticsearch
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      BACKFILL_BROWSE_PATHS_V2: "true"
      REPROCESS_DEFAULT_BROWSE_PATHS_V2: "false"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      DATAHUB_TOKEN_SERVICE_SALT: ${DATAHUB_TOKEN_SERVICE_SALT}
    labels:
      datahub_setup_job: "true"

  datahub-gms:
    image: acryldata/datahub-gms:${DATAHUB_VERSION:-head}
    container_name: datahub-gms
    hostname: datahub-gms
    restart: unless-stopped
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    ports:
      - "${DATAHUB_GMS_PORT:-8082}:8080"
    environment:
      DATAHUB_SERVER_TYPE: ${DATAHUB_SERVER_TYPE:-quickstart}
      DATAHUB_TELEMETRY_ENABLED: ${DATAHUB_TELEMETRY_ENABLED:-false}
      DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID: generic-duhe-consumer-job-client-gms
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      EBEAN_DATASOURCE_USERNAME: datahub
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_PORT: 9200
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
      ES_BULK_REFRESH_POLICY: WAIT_UNTIL
      GRAPH_SERVICE_DIFF_MODE_ENABLED: "true"
      GRAPH_SERVICE_IMPL: elasticsearch
      JAVA_OPTS: -Xms1g -Xmx1g
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR: "true"
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      MAE_CONSUMER_ENABLED: "true"
      MCE_CONSUMER_ENABLED: "true"
      METADATA_SERVICE_AUTH_ENABLED: "false"
      PE_CONSUMER_ENABLED: "true"
      THEME_V2_DEFAULT: "true"
      UI_INGESTION_ENABLED: "true"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      DATAHUB_TOKEN_SERVICE_SALT: ${DATAHUB_TOKEN_SERVICE_SALT}
    volumes:
      - ${HOME}/.datahub/plugins:/etc/datahub/plugins
    healthcheck:
      test: curl -sS --fail http://datahub-gms:8080/health
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 90s

  datahub-frontend:
    image: acryldata/datahub-frontend-react:${DATAHUB_VERSION:-head}
    container_name: datahub-frontend
    hostname: datahub-frontend
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    ports:
      - "${DATAHUB_FRONTEND_PORT:-9002}:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      DATAHUB_SECRET: ${DATAHUB_SECRET:-YouKnowNothing}
      DATAHUB_APP_VERSION: ${DATAHUB_VERSION:-v1.0.0}
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      JAVA_OPTS: -Xms512m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      DATAHUB_TRACKING_TOPIC: DataHubUsageEvent_v1
      ELASTIC_CLIENT_HOST: datahub-elasticsearch
      ELASTIC_CLIENT_PORT: 9200
    volumes:
      - ${HOME}/.datahub/plugins:/etc/datahub/plugins

  datahub-actions:
    image: acryldata/datahub-actions:${DATAHUB_VERSION:-head}-slim
    container_name: datahub-actions
    hostname: datahub-actions
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      DATAHUB_GMS_PROTOCOL: http
      DATAHUB_SYSTEM_CLIENT_ID: __datahub_system
      DATAHUB_SYSTEM_CLIENT_SECRET: JohnSnowKnowsNothing
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      METADATA_AUDIT_EVENT_NAME: MetadataAuditEvent_v4
      METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME: MetadataChangeLog_Versioned_v1
      SCHEMA_REGISTRY_URL: http://datahub-schema-registry:8081

volumes:
  mysql-data:
  minio-data:
  datahub-zkdata:
  datahub-zklogs:
  datahub-broker:
  datahub-esdata:
  datahub-mysqldata:
