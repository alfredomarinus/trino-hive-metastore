source:
  type: trino
  config:
    host_port: "trino:8443"
    username: "admin"
    spassword: "${TRINO_ADMIN_PASSWORD}"
    database: "hive"
    options:
      connect_args:
        http_scheme: "https"
        verify: false
    profiling:
      enabled: false
    stateful_ingestion:
      enabled: true

sink:
  type: datahub-rest
  config:
    server: "http://datahub-gms:8080"
