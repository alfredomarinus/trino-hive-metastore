source:
  type: trino
  config:
    host_port: "trino:8443"
    username: "admin"
    password: "${TRINO_ADMIN_PASSWORD}"
    database: "bronze"
    options:
      connect_args:
        http_scheme: "https"
        verify: true
    profiling:
      enabled: false
    stateful_ingestion:
      enabled: true